name: 'Automatic build'
on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

permissions:
  contents: write

jobs:
  continuous-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7
          bundler-cache: true

      - name: Build Jekyll
        run: bundle exec jekyll b

      - name: Sync compiled CSS to main (only if changed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "Fetching current style.css from main..."
          RESP=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/assets/css/style.css?ref=main")

          echo "$RESP" | python3 -c "
import sys, json
try:
    data = json.load(sys.stdin)
    sha = data.get('sha', '')
    current_content = data.get('content', '')
    print(f'SHA={sha}')
    print(f'CURRENT_LEN={len(current_content)}')
except:
    print('SHA=')
    print('CURRENT_LEN=0')
" > /tmp/state.txt
          . /tmp/state.txt

          if [ -z "$SHA" ]; then
            echo "[Sync] No existing style.css on main — will create new"
          else
            echo "[Sync] Found existing SHA=$SHA"
          fi

          # Base64-encode the new CSS
          NEW_B64=$(python3 -c "
import base64
with open('_site/assets/css/style.css', 'rb') as f:
    print(base64.b64encode(f.read()).decode())
")

          # Only commit if content changed
          if [ "$SHA" = "" ] || [ "$CURRENT_LEN" != "${#NEW_B64}" ]; then
            echo "[Sync] Content changed — uploading..."
            python3 << PYEOF
import json, urllib.request, os

payload = {
    "message": "[Automation] Sync compiled style.css",
    "content": "$NEW_B64",
    "branch": "main"
}
if "$SHA":
    payload["sha"] = "$SHA"

req = urllib.request.Request(
    "https://api.github.com/repos/$GITHUB_REPOSITORY/contents/assets/css/style.css",
    data=json.dumps(payload).encode(),
    headers={"Authorization": "token $GITHUB_TOKEN", "Content-Type": "application/json"},
    method="PUT"
)
with urllib.request.urlopen(req) as resp:
    result = json.loads(resp.read())
    print("Committed:", result.get("commit", {}).get("sha", "?"))
PYEOF
          else
            echo "[Sync] CSS unchanged — skipping commit"
          fi

      - name: Deploy to gh-pages
        run: bash tools/deploy.sh
