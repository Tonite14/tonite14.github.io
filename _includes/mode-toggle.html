<!--
  Switch the mode between dark and light.
-->

<!-- Custom: 主页背景图 + 毛玻璃卡片 -->
<style>
  #main-wrapper {
    background-image: url('/assets/config/background.jpg') !important;
    background-size: cover !important;
    background-position: center !important;
    background-attachment: fixed !important;
    background-repeat: no-repeat !important;
  }

  #main-wrapper::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(255, 255, 255, 0.40);
    z-index: -1;
    pointer-events: none;
  }

  [data-mode="dark"] #main-wrapper::before {
    background: rgba(15, 15, 20, 0.42);
  }

  #post-list .post-preview {
    background: rgba(255, 255, 255, 0.88) !important;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(200, 200, 200, 0.25) !important;
    border-radius: 0.75rem !important;
    margin-bottom: 0.75rem !important;
    padding: 1rem 1.25rem !important;
    transition: background 0.2s ease, transform 0.15s ease !important;
  }

  #post-list .post-preview:hover {
    background: rgba(255, 255, 255, 0.95) !important;
    transform: translateY(-2px);
  }

  #post-list .post-preview .card {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    border-radius: 0 !important;
    margin: 0 !important;
  }

  #post-list .post-preview .card-body {
    padding: 0;
  }

  #post-list .post-preview .card-title,
  #post-list .post-preview .card-title a {
    color: #1a1a1a !important;
    font-weight: 700;
  }

  #post-list .post-preview .post-content,
  #post-list .post-content p {
    color: #3a3a3a !important;
    margin-bottom: 0;
  }

  #post-list .post-preview .post-meta {
    color: #777 !important;
  }

  [data-mode="dark"] #post-list .post-preview {
    background: rgba(30, 30, 38, 0.88) !important;
    border-color: rgba(255, 255, 255, 0.07) !important;
  }

  [data-mode="dark"] #post-list .post-preview:hover {
    background: rgba(45, 45, 55, 0.95) !important;
  }

  [data-mode="dark"] #post-list .post-preview .card-title,
  [data-mode="dark"] #post-list .post-preview .card-title a {
    color: #e0e0e0 !important;
  }

  [data-mode="dark"] #post-list .post-preview .post-content p {
    color: #b5b5c0 !important;
  }

  [data-mode="dark"] #post-list .post-preview .post-meta {
    color: #888 !important;
  }
</style>

<script type="text/javascript">
  class ModeToggle {
    static get MODE_KEY() { return "mode"; }
    static get MODE_ATTR() { return "data-mode"; }
    static get DARK_MODE() { return "dark"; }
    static get LIGHT_MODE() { return "light"; }
    static get ID() { return "mode-toggle"; }

    constructor() {
      if (this.hasMode) {
        if (this.isDarkMode) {
          if (!this.isSysDarkPrefer) {
            this.setDark();
          }
        } else {
          if (this.isSysDarkPrefer) {
            this.setLight();
          }
        }
      }

      let self = this;

      /* always follow the system prefers */
      this.sysDarkPrefers.addEventListener("change", () => {
        if (self.hasMode) {
          if (self.isDarkMode) {
            if (!self.isSysDarkPrefer) {
              self.setDark();
            }

          } else {
            if (self.isSysDarkPrefer) {
              self.setLight();
            }
          }

          self.clearMode();
        }

        self.notify();

      });

    } /* constructor() */

    get sysDarkPrefers() { return window.matchMedia("(prefers-color-scheme: dark)"); }

    get isSysDarkPrefer() { return this.sysDarkPrefers.matches; }

    get isDarkMode() { return this.mode === ModeToggle.DARK_MODE; }

    get isLightMode() { return this.mode === ModeToggle.LIGHT_MODE; }

    get hasMode() { return this.mode != null; }

    get mode() { return sessionStorage.getItem(ModeToggle.MODE_KEY); }

    /* get the current mode on screen */
    get modeStatus() {
      if (this.isDarkMode
        || (!this.hasMode && this.isSysDarkPrefer)) {
        return ModeToggle.DARK_MODE;
      } else {
        return ModeToggle.LIGHT_MODE;
      }
    }

    setDark() {
      $('html').attr(ModeToggle.MODE_ATTR, ModeToggle.DARK_MODE);
      sessionStorage.setItem(ModeToggle.MODE_KEY, ModeToggle.DARK_MODE);
    }

    setLight() {
      $('html').attr(ModeToggle.MODE_ATTR, ModeToggle.LIGHT_MODE);
      sessionStorage.setItem(ModeToggle.MODE_KEY, ModeToggle.LIGHT_MODE);
    }

    clearMode() {
      $('html').removeAttr(ModeToggle.MODE_ATTR);
      sessionStorage.removeItem(ModeToggle.MODE_KEY);
    }

    /* Notify another plugins that the theme mode has changed */
    notify() {
      window.postMessage({
        direction: ModeToggle.ID,
        message: this.modeStatus
      }, "*");
    }

  } /* ModeToggle */

  const toggle = new ModeToggle();

  function flipMode() {
    if (toggle.hasMode) {
      if (toggle.isSysDarkPrefer) {
        if (toggle.isLightMode) {
          toggle.clearMode();
        } else {
          toggle.setLight();
        }

      } else {
        if (toggle.isDarkMode) {
          toggle.clearMode();
        } else {
          toggle.setDark();
        }
      }

    } else {
      if (toggle.isSysDarkPrefer) {
        toggle.setLight();
      } else {
        toggle.setDark();
      }
    }

    toggle.notify();

  } /* flipMode() */

</script>
